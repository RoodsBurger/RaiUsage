name: Feature request
description: Suggest a new feature or improvement for RaiUsage
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea ! The more clearly you can describe the *problem* you want to solve, the better. Implementation ideas are welcome but totally optional 🤘

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point.
      placeholder: When I'm pair-programming with two Claude accounts, I can't tell which one is currently in use.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution (optional)
      description: How would you imagine RaiUsage solving this?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered (optional)

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this affect? (optional)
      multiple: true
      options:
        - Menu bar
        - Popover / dashboard
        - Widget
        - Agent watchers overlay
        - Notifications
        - Settings
        - Other / cross-cutting

  - type: textarea
    id: additional
    attributes:
      label: Anything else? (optional)
      description: Screenshots, mockups, references to other apps doing this, etc.
