name: Bug report
description: Something in RaiUsage is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug ! Fill in what you can, more info makes things easier to track down but don't stress if some fields don't apply 🤘

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A short description of the bug.
      placeholder: When I click X, the widget shows Y instead of Z.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the widget to refresh and show the new value.

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce (if you have them)
      placeholder: |
        1. Open RaiUsage
        2. Click the menu bar icon
        3. ...

  - type: input
    id: raiusage-version
    attributes:
      label: RaiUsage version
      description: Found in Settings -> About, or the menu bar tooltip.
      placeholder: e.g. 5.1.1
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. 14.5 (Sonoma) / 15.1 (Sequoia)
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install RaiUsage? (optional)
      options:
        - DMG from GitHub Releases
        - Homebrew cask
        - Built from source
        - Other / not sure

  - type: dropdown
    id: claude-plan
    attributes:
      label: Claude plan (optional)
      options:
        - Pro
        - Max
        - Team
        - Not sure

  - type: textarea
    id: logs
    attributes:
      label: Logs or console output (optional)
      description: |
        Open `Console.app`, filter by `RaiUsage`, reproduce the bug, and paste any relevant error lines here.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / screen recording (optional)
      description: Drag-and-drop images or videos directly into this field.

  - type: textarea
    id: additional
    attributes:
      label: Anything else? (optional)
      description: Other tools running, multiple Claude accounts, anything that might be relevant.

  - type: checkboxes
    id: terms
    attributes:
      label: Quick check
      options:
        - label: I had a quick look for existing issues that might match.
          required: true
