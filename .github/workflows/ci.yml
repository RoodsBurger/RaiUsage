name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen || brew link xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          xcodebuild \
            -project RaiUsage.xcodeproj \
            -scheme RaiUsageApp \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Test
        run: |
          xcodebuild \
            -project RaiUsage.xcodeproj \
            -scheme RaiUsageTests \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            test
