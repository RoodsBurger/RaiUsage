name: RaiUsage
options:
  bundleIdPrefix: com.raiusage
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  defaultLocalization: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "S7B8M9JYF4"
    MARKETING_VERSION: "6.2.4"
    CURRENT_PROJECT_VERSION: "1"
    ARCHS: "arm64 x86_64"

targets:
  RaiUsageApp:
    type: application
    platform: macOS
    sources:
      - path: RaiUsageApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raiusage.app
        PRODUCT_NAME: RaiUsage
        CODE_SIGN_ENTITLEMENTS: RaiUsageApp/RaiUsageApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: RaiUsageApp/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleDisplayName: RaiUsage
        LSUIElement: true
        LSMultipleInstancesProhibited: true
        CFBundleURLTypes:
          - CFBundleURLName: com.raiusage.app
            CFBundleURLSchemes:
              - raiusage

  RaiUsageTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RaiUsageTests
      - path: Shared
      - path: RaiUsageApp/Onboarding/OnboardingViewModel.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raiusage.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"

schemes:
  RaiUsageTests:
    build:
      targets:
        RaiUsageTests: [test]
    test:
      config: Debug
      targets:
        - RaiUsageTests

  RaiUsageApp:
    build:
      targets:
        RaiUsageApp: all
    run:
      config: Debug
    archive:
      config: Release
